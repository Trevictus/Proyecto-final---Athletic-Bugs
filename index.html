<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athletic Bugs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./ui.css">
  <link rel="stylesheet" href="./buggy.css">
</head>
<body>
  <main class="desktop-stage">
    <section class="phone-shell" aria-label="Aplicacion Athletic Bugs dentro de un iPhone">
      <div class="phone-shell__viewport">
        <div class="scene-overlay is-hidden" id="scene-overlay" aria-hidden="true">
          <button class="scene-overlay__close" id="scene-close" type="button" aria-label="Cerrar escenario">X</button>
          <div class="scene-overlay__background">
            <div class="scene-overlay__badge" id="scene-rank">Nivel Base</div>
            <div class="scene-overlay__avatar-zone">
              <div class="buggy buggy--scene" id="buggy-scene-avatar" data-upper-tier="2" data-lower-tier="2" data-mood="focused" aria-label="Avatar de Buggy dentro del escenario">
                <div class="buggy__shadow"></div>
                <div class="buggy__head">
                  <div class="buggy__horn buggy__horn--left"></div>
                  <div class="buggy__horn buggy__horn--right"></div>
                  <div class="buggy__face">
                    <div class="buggy__eyes">
                      <span class="buggy__eye"></span>
                      <span class="buggy__eye"></span>
                    </div>
                    <div class="buggy__mouth"></div>
                  </div>
                </div>
                <div class="buggy__torso">
                  <div class="buggy__core"></div>
                  <div class="buggy__arm buggy__arm--left"></div>
                  <div class="buggy__arm buggy__arm--right"></div>
                </div>
                <div class="buggy__legs">
                  <div class="buggy__leg buggy__leg--left"></div>
                  <div class="buggy__leg buggy__leg--right"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="app-screen">
          <header class="hero-card pixel-panel">
            <p class="hero-card__eyebrow">Athletic Bugs</p>
            <div class="hero-card__headline">
              <div>
                <h1>Retro Gym Tracker</h1>
                <p id="status-copy">Cada sesion modifica cabeza, torso y patas en tiempo real.</p>
              </div>
              <div class="hero-card__level pixel-chip" id="buggy-rank">Nivel Base</div>
            </div>
          </header>

          <section class="buggy-panel pixel-panel">
            <div class="buggy-panel__marquee">
              <span>MUEVE LAS PATAS</span>
              <span>RETRO GYM MODE</span>
            </div>
            <div class="buggy-panel__metrics" aria-label="Resumen del estado actual">
              <article class="pixel-stat">
                <span>Superior</span>
                <strong id="upper-output">4</strong>
              </article>
              <article class="pixel-stat">
                <span>Inferior</span>
                <strong id="lower-output">4</strong>
              </article>
              <article class="pixel-stat">
                <span>Animo</span>
                <strong id="mood-output">Enfocado</strong>
              </article>
            </div>

            <div class="buggy-stage">
              <div class="buggy-stage__room"></div>
              <div class="buggy-stage__banner">NO PAIN NO GAIN</div>
              <div class="buggy-stage__decor buggy-stage__decor--left"></div>
              <div class="buggy-stage__decor buggy-stage__decor--right"></div>
              <div class="buggy-stage__rug"></div>
              <div class="buggy" id="buggy-avatar" data-upper-tier="2" data-lower-tier="2" data-mood="focused" aria-label="Avatar dinamico Buggy">
                <div class="buggy__shadow"></div>
                <div class="buggy__head">
                  <div class="buggy__horn buggy__horn--left"></div>
                  <div class="buggy__horn buggy__horn--right"></div>
                  <div class="buggy__face">
                    <div class="buggy__eyes">
                      <span class="buggy__eye"></span>
                      <span class="buggy__eye"></span>
                    </div>
                    <div class="buggy__mouth"></div>
                  </div>
                </div>
                <div class="buggy__torso">
                  <div class="buggy__core"></div>
                  <div class="buggy__arm buggy__arm--left"></div>
                  <div class="buggy__arm buggy__arm--right"></div>
                </div>
                <div class="buggy__legs">
                  <div class="buggy__leg buggy__leg--left"></div>
                  <div class="buggy__leg buggy__leg--right"></div>
                </div>
              </div>
            </div>
          </section>

          <section class="panel-card pixel-panel">
            <div class="panel-card__header">
              <div>
                <p class="panel-card__eyebrow">Registro</p>
                <h2>Cabina De Entreno</h2>
              </div>
              <button class="ghost-button pixel-button pixel-button--muted" id="reset-button" type="button">Reset</button>
            </div>

            <form id="training-form" class="training-form">
              <label class="training-form__field" for="upper-body-range">
                <span>Tren superior</span>
                <input id="upper-body-range" name="upperBody" type="range" min="0" max="10" step="1" value="4">
              </label>

              <label class="training-form__field" for="lower-body-range">
                <span>Tren inferior</span>
                <input id="lower-body-range" name="lowerBody" type="range" min="0" max="10" step="1" value="4">
              </label>

              <fieldset class="training-form__field training-form__field--mood">
                <legend>Estado de animo</legend>
                <div class="mood-picker" id="mood-picker">
                  <button type="button" class="mood-pill is-active" data-mood-option="focused">Enfocado</button>
                  <button type="button" class="mood-pill" data-mood-option="charged">Cargado</button>
                  <button type="button" class="mood-pill" data-mood-option="playful">Jugueton</button>
                  <button type="button" class="mood-pill" data-mood-option="tired">Cansado</button>
                </div>
              </fieldset>

              <label class="training-form__field" for="session-note">
                <span>Nota rapida</span>
                <textarea id="session-note" name="note" rows="3" maxlength="90" placeholder="Ej: hombros fuertes, piernas pesadas"></textarea>
              </label>

              <button class="primary-button pixel-button" type="submit">Aplicar Entreno</button>
            </form>
          </section>

          <section class="panel-card panel-card--history pixel-panel">
            <div class="panel-card__header">
              <div>
                <p class="panel-card__eyebrow">Bitacora</p>
                <h2>Registro Del Gym</h2>
              </div>
            </div>
            <ul id="session-history" class="history-list" aria-live="polite"></ul>
          </section>
        </div>
      </div>

      <svg
        class="phone-shell__frame"
        viewBox="0 0 1024 2048"
        aria-hidden="true"
        focusable="false"
      >
        <image href="./assets/iphone-frame.png" width="1024" height="2048" preserveAspectRatio="xMidYMid meet"></image>
      </svg>
    </section>
  </main>

  <script type="module" src="./ui.js"></script>
</body>
</html>
